name: DART Realtime Monitor

on:
  schedule:
    # 5분마다 정기적으로 실행 (UTC 기준이므로 매 시각 0,5,10... 분에 실행)
    - cron: '*/5 * * * *'
  workflow_dispatch: # 수동으로 실행하고 싶을 때 쓰는 버튼 활성화

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-node-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        pip install requests

    - name: 템플릿 스크립트 실행
      env:
        TELEGRAM_TOKEN: ${{ secrets::TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets::TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: 중복 방지 히스토리 파일 자동 저장 (Git Commit)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add history.txt || true
        git commit -m "Update public history" || true
        git push || true
